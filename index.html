<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso dia 💍</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #0f2027, #1c2b36);
    font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial, sans-serif;
    color: #f5f5f7;
    text-align: center;
    padding: 20px;
}

.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 30px;
    width: 100%;
    max-width: 900px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

h1 {
    font-weight: 500;
    font-size: 28px;
    margin-bottom: 40px;
    letter-spacing: 1px;
}

.contador {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 40px;
}

.bloco {
    flex: 1;
}

.numero {
    font-size: clamp(28px, 5vw, 60px);
    font-weight: 600;
    transition: all 0.4s ease;
}

.numero.animar {
    transform: translateY(-5px);
    opacity: 0.7;
}

.label {
    font-size: 14px;
    opacity: 0.6;
    margin-top: 5px;
    letter-spacing: 1px;
}

.totais {
    font-size: 16px;
    line-height: 2;
    opacity: 0.85;
}

.destaque {
    font-weight: 600;
    font-size: 18px;
}

@media (max-width: 600px) {
    .container {
        padding: 25px;
    }

    .contador {
        gap: 5px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Nosso dia 💍</h1>

    <div class="contador" id="contador"></div>

    <div class="totais">
        <div>Faltam <span class="destaque" id="totalDias"></span> dias</div>
        <div><span class="destaque" id="totalHoras"></span> horas</div>
        <div><span class="destaque" id="totalMinutos"></span> minutos</div>
        <div><span class="destaque" id="totalSegundos"></span> segundos</div>
    </div>
</div>

<script>
const dataAlvo = new Date("2026-12-12T11:00:00");

function animarNumero(elemento, novoValor) {
    elemento.classList.add("animar");
    setTimeout(() => {
        elemento.textContent = novoValor;
        elemento.classList.remove("animar");
    }, 200);
}

function atualizarContagem() {
    const agora = new Date();

    if (agora >= dataAlvo) {
        document.getElementById("contador").innerHTML =
            "<div class='numero'>Chegou nosso grande dia 💍</div>";
        document.querySelector(".totais").innerHTML = "";
        return;
    }

    let diff = dataAlvo - agora;

    let totalSegundos = Math.floor(diff / 1000);
    let totalMinutos = Math.floor(diff / (1000 * 60));
    let totalHoras = Math.floor(diff / (1000 * 60 * 60));
    let totalDias = Math.floor(diff / (1000 * 60 * 60 * 24));

    let segundos = totalSegundos % 60;
    let minutos = totalMinutos % 60;
    let horas = totalHoras % 24;

    let meses = 0;
    let dias = totalDias;
    let tempData = new Date(agora);

    while (true) {
        let proximoMes = new Date(
            tempData.getFullYear(),
            tempData.getMonth() + 1,
            tempData.getDate(),
            tempData.getHours(),
            tempData.getMinutes(),
            tempData.getSeconds()
        );

        if (proximoMes <= dataAlvo) {
            meses++;
            tempData = proximoMes;
        } else {
            break;
        }
    }

    dias = Math.floor((dataAlvo - tempData) / (1000 * 60 * 60 * 24));

    document.getElementById("contador").innerHTML = `
        <div class="bloco"><div class="numero" id="m">${meses}</div><div class="label">Meses</div></div>
        <div class="bloco"><div class="numero" id="d">${dias}</div><div class="label">Dias</div></div>
        <div class="bloco"><div class="numero" id="h">${horas}</div><div class="label">Horas</div></div>
        <div class="bloco"><div class="numero" id="min">${minutos}</div><div class="label">Minutos</div></div>
        <div class="bloco"><div class="numero" id="s">${segundos}</div><div class="label">Segundos</div></div>
    `;

    document.getElementById("totalDias").textContent = totalDias.toLocaleString("pt-BR");
    document.getElementById("totalHoras").textContent = totalHoras.toLocaleString("pt-BR");
    document.getElementById("totalMinutos").textContent = totalMinutos.toLocaleString("pt-BR");
    document.getElementById("totalSegundos").textContent = totalSegundos.toLocaleString("pt-BR");
}

setInterval(atualizarContagem, 1000);
atualizarContagem();
</script>

</body>
</html>
